# ----------------------------
# Skill-Share - Base Settings
# ----------------------------
spring.application.name=skill-share
server.port=${PORT:8085}
# ----------------------------
# Thymeleaf (safe defaults)
# ----------------------------
spring.thymeleaf.cache=false

# ----------------------------
# Session Management
# ----------------------------
server.servlet.session.timeout=20m

# ----------------------------
# Logging (optional, helpful)
# ----------------------------
logging.level.org.springframework=INFO

# ----------------------------
# Database (Sprint 1 - will be finalized in DB task)
# Leave commented for now to avoid startup failures if MySQL isn't ready.
# ----------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/skillshare_db?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=YOUR_PASSWORD
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----------------------------
# Database connection (Environment Variables for Render/Deployment)
# ----------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/skillshare_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Mj28102003}

# ----------------------------
# JPA / Hibernate
# ----------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----------------------------
# File Upload Limits
# ----------------------------
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ----------------------------
# Email Configuration (Gmail)
# ----------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

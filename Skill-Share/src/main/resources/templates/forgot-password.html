<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="view-transition" content="same-origin" />
    <title>Forgot Password — SkillShare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/glass-login.css}">
    <style>
        .login-header p {
            margin-top: 0.5rem;
            color: #64748b;
        }
    </style>
</head>

<body>
    <!-- Topbar matching home/about pages -->
    <nav class="auth-topbar">
        <span class="auth-topbar-brand">
            <i class="bi bi-arrow-left-right me-1"></i>SkillShare
        </span>
        <a th:href="@{/login}" class="auth-topbar-link">
            <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
    </nav>

    <div class="page-background">
        <div class="glass-card" th:classappend="${error} ? 'shake-animation'">
            <div class="card-content">
                <div class="logo-container">
                    <img src="/images/logo_ss.png" alt="Skill-Share Logo" class="custom-logo">
                </div>

                <div class="login-header">
                    <h3>Forgot Password</h3>
                    <p>Enter your registered email address to receive a password reset link.</p>
                </div>

                <div th:if="${error}" class="alert alert-error">
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${success}" class="alert alert-success">
                    <span th:text="${success}"></span>
                </div>

                <form th:action="@{/forgot-password}" method="post">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control"
                            placeholder="username@gmail.com" required autofocus />
                    </div>

                    <button type="submit" class="btn-primary">Send Reset Link</button>
                </form>

                <div class="register-link">
                    Remember your password? <a th:href="@{/login}">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="view-transition" content="same-origin" />
    <title>Set New Password — SkillShare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/glass-login.css}">
    <style>
        .pw-wrapper {
            position: relative;
        }

        .pw-wrapper .form-control {
            padding-right: 2.8rem;
        }

        .pw-toggle {
            position: absolute;
            right: .75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted, #64748b);
            padding: 0;
            line-height: 1;
            font-size: 1rem;
            transition: color .2s;
        }

        .pw-toggle:hover {
            color: var(--primary, #3b82f6);
        }

        .form-control.is-invalid {
            border-color: #dc2626;
        }
        
        .error-message { 
            color: #dc2626; 
            font-size: 0.85rem; 
            margin-top: 0.4rem; 
            font-weight: 500; 
        }
    </style>
</head>

<body>
    <!-- Topbar matching home/about pages -->
    <nav class="auth-topbar">
        <span class="auth-topbar-brand">
            <i class="bi bi-arrow-left-right me-1"></i>SkillShare
        </span>
    </nav>

    <div class="page-background">
        <div class="glass-card" th:classappend="${error} ? 'shake-animation'">
            <div class="card-content">
                <div class="logo-container">
                    <img src="/images/logo_ss.png" alt="Skill-Share Logo" class="custom-logo">
                </div>

                <div class="login-header">
                    <h3>Set New Password</h3>
                    <p>Enter your new password below to regain access.</p>
                </div>

                <div th:if="${error}" class="alert alert-error">
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/reset-password}" th:object="${resetPasswordDTO}" method="post">
                    
                    <input type="hidden" th:field="*{token}" />

                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div class="pw-wrapper">
                            <input type="password" th:field="*{newPassword}" class="form-control" th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''"
                                placeholder="New Password" required autofocus />
                            <button type="button" class="pw-toggle" id="pw-toggle-btn1" aria-label="Show password"
                                onclick="(function(){
                                    var i=document.getElementById('newPassword');
                                    var b=document.getElementById('pw-toggle-btn1');
                                    if(i.type==='password'){i.type='text';b.innerHTML='&#128065;&#65039;';}
                                    else{i.type='password';b.innerHTML='&#128065;';}
                                })()">
                                &#128065;
                            </button>
                        </div>
                        <div class="error-message" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                        <div class="form-text mt-1 text-muted" style="font-size: 0.8em;">Password must be at least 8 characters long.</div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="pw-wrapper">
                            <input type="password" th:field="*{confirmPassword}" class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                                placeholder="Confirm Password" required />
                            <button type="button" class="pw-toggle" id="pw-toggle-btn2" aria-label="Show password"
                                onclick="(function(){
                                    var i=document.getElementById('confirmPassword');
                                    var b=document.getElementById('pw-toggle-btn2');
                                    if(i.type==='password'){i.type='text';b.innerHTML='&#128065;&#65039;';}
                                    else{i.type='password';b.innerHTML='&#128065;';}
                                })()">
                                &#128065;
                            </button>
                        </div>
                        <div class="error-message" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>

                    <button type="submit" class="btn-primary">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — SkillShare</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --accent: #6366f1;
            --text-dark: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --card-border: rgba(148, 163, 184, .15);
            --radius: 1rem;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            color: var(--text-body);
            background: var(--bg-light);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, .88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--card-border);
            padding: .75rem 0;
            position: sticky;
            top: 0;
            z-index: 1050;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }

        .navbar-brand-text {
            font-weight: 800;
            font-size: 1.35rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-link-custom {
            color: var(--text-muted);
            font-weight: 600;
            font-size: .95rem;
            text-decoration: none;
            padding: .5rem 1rem;
            border-radius: .5rem;
            transition: color .2s, background .2s;
        }

        .nav-link-custom:hover,
        .nav-link-custom.active {
            color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .hero-banner {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 4rem 1rem;
            text-align: center;
            color: #fff;
        }

        .stat-card {
            background: #fff;
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,.1);
        }

        .stat-icon {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .footer {
            background: var(--text-dark);
            color: #94a3b8;
            text-align: center;
            padding: 2rem 1rem;
            font-size: .88rem;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between">
            <span class="navbar-brand-text">
                <i class="bi bi-shield-lock-fill me-1"></i>SkillShare Admin
            </span>
            <div class="d-flex align-items-center gap-2">
                <a th:href="@{/admin/dashboard}" class="nav-link-custom active">Dashboard</a>
                <a th:href="@{/admin/users}" class="nav-link-custom">Users</a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="hero-banner">
        <div class="container">
            <h1 class="fw-bold fs-1">System Overview</h1>
            <p class="text-light opacity-75 fs-5">Monitor SkillShare platform statistics.</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container py-5">
        <div class="row g-4">
            <div class="col-md-6 col-lg-3">
                <div class="stat-card">
                    <i class="bi bi-people-fill stat-icon text-primary"></i>
                    <div class="stat-value" th:text="${totalUsers}">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="stat-card">
                    <i class="bi bi-lightbulb-fill stat-icon text-warning"></i>
                    <div class="stat-value" th:text="${totalSkills}">0</div>
                    <div class="stat-label">Listed Skills</div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="stat-card">
                    <i class="bi bi-arrow-left-right stat-icon text-success"></i>
                    <div class="stat-value" th:text="${totalExchanges}">0</div>
                    <div class="stat-label">Total Exchanges</div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="stat-card">
                    <i class="bi bi-star-fill stat-icon text-info"></i>
                    <div class="stat-value" th:text="${totalRatings}">0</div>
                    <div class="stat-label">Total Ratings</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="mb-0">&copy; 2026 SkillShare Admin. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

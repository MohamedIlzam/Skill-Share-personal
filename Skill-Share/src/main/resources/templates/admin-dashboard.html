<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Dashboard — SkillShare</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #93c5fd;
            --primary-subtle: #eff6ff;
            --accent: #6366f1;
            --text-dark: #0A192F;
            --text-body: #334155;
            --text-muted: #64748b;
            --bg-light: #F4F7FC;
            --radius: 1rem;
        }

        body {
            font-family: 'Inter', 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-body);
            background: var(--bg-light);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 64px;
        }
        @media (max-width: 767.98px) {
            body {
                padding-bottom: 74px;
            }
        }

        .text-navy {
            color: #0A192F !important;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, .88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(148, 163, 184, .15);
            padding: .75rem 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1040;
        }

        .navbar-brand-text {
            font-weight: 800;
            font-size: 1.35rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-link-custom {
            color: var(--text-muted);
            font-weight: 600;
            font-size: .95rem;
            text-decoration: none;
            padding: .5rem 1rem;
            border-radius: .5rem;
            transition: color .2s, background .2s;
        }

        .nav-link-custom:hover,
        .nav-link-custom.active {
            color: var(--primary);
            background: var(--primary-subtle);
        }

        /* Mobile Bottom Tab Bar for Admin */
        .mobile-bottom-tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
            display: none;
            align-items: center;
            justify-content: space-around;
            z-index: 1040;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.03);
        }

        .mobile-tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            text-decoration: none;
            font-size: 10px;
            font-weight: 700;
            gap: 2px;
            transition: color 0.2s;
            width: 50%;
        }

        .mobile-tab-item:hover, .mobile-tab-item.active {
            color: #3b82f6;
            text-decoration: none;
        }

        .mobile-tab-item i {
            font-size: 20px;
        }

        @media (max-width: 767.98px) {
            .mobile-bottom-tabbar {
                display: flex !important;
            }
        }

        /* Dashboard Stat Cards */
        .stat-card {
            background: #fff;
            border: 1px solid rgba(148, 163, 184, .15);
            border-radius: 1.25rem;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
        }

        /* Icon Badge Backgrounds */
        .stat-icon-wrapper {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 1.25rem;
        }
        
        .icon-users { background-color: #eff6ff; color: #2563eb; }
        .icon-skills { background-color: #fffbeb; color: #d97706; }
        .icon-exchanges { background-color: #f0fdf4; color: #16a34a; }
        .icon-ratings { background-color: #faf5ff; color: #7e22ce; }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 800;
            color: #0A192F;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.95rem;
            color: #64748b;
            font-weight: 600;
        }

        .footer {
            background: #0A192F;
            color: #94a3b8;
            text-align: center;
            padding: 1.5rem 1rem;
            font-size: .85rem;
            margin-top: auto;
        }
        
        .mobile-icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fee2e2;
            border-radius: 50%;
            color: #dc2626;
            transition: all 0.2s;
            text-decoration: none;
            border: none;
            outline: none;
            cursor: pointer;
        }
        .mobile-icon-btn:hover {
            background: #fecaca;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between">
            <span class="navbar-brand-text">
                <i class="bi bi-shield-lock-fill me-1"></i>SkillShare Admin
            </span>
            <!-- Desktop Links -->
            <div class="d-none d-md-flex align-items-center gap-2">
                <a th:href="@{/admin/dashboard}" class="nav-link-custom active">Dashboard</a>
                <a th:href="@{/admin/users}" class="nav-link-custom">Users</a>
            </div>
            <!-- Desktop Logout -->
            <div class="d-none d-md-flex align-items-center gap-3">
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
            <!-- Mobile Action -->
            <div class="d-flex d-md-none align-items-center">
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="mobile-icon-btn" title="Logout">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-4 flex-grow-1" style="max-width: 1000px;">
        
        <!-- Page Header -->
        <div class="mb-4 text-center text-md-start">
            <h1 class="fw-extrabold text-navy mb-1" style="font-size: 1.85rem;">System Overview</h1>
            <p class="text-muted mb-0" style="font-size: 0.95rem;">Monitor SkillShare platform statistics and activity metrics.</p>
        </div>

        <div class="row g-4">
            <div class="col-sm-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-icon-wrapper icon-users">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div class="stat-value" th:text="${totalUsers}">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-icon-wrapper icon-skills">
                        <i class="bi bi-lightbulb-fill"></i>
                    </div>
                    <div class="stat-value" th:text="${totalSkills}">0</div>
                    <div class="stat-label">Listed Skills</div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-icon-wrapper icon-exchanges">
                        <i class="bi bi-arrow-left-right"></i>
                    </div>
                    <div class="stat-value" th:text="${totalExchanges}">0</div>
                    <div class="stat-label">Total Exchanges</div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-icon-wrapper icon-ratings">
                        <i class="bi bi-star-fill"></i>
                    </div>
                    <div class="stat-value" th:text="${totalRatings}">0</div>
                    <div class="stat-label">Total Ratings</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Tab Bar -->
    <nav class="mobile-bottom-tabbar d-flex d-md-none">
        <a th:href="@{/admin/dashboard}" class="mobile-tab-item active">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
        </a>
        <a th:href="@{/admin/users}" class="mobile-tab-item">
            <i class="bi bi-people"></i>
            <span>Users</span>
        </a>
    </nav>

    <footer class="footer d-none d-md-block">
        <div class="container">
            <p class="mb-0">&copy; 2026 SkillShare Admin. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

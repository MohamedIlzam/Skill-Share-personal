<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Messages — SkillShare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #3b82f6; --primary-dark: #2563eb; --accent: #6366f1;
            --text-dark: #0f172a; --text-body: #334155; --text-muted: #64748b;
            --bg-light: #f8fafc; --card-border: rgba(148, 163, 184, .15); --radius: 1rem;
        }
        body { font-family: -apple-system, system-ui, sans-serif; color: var(--text-body); background: var(--bg-light); min-height: 100vh; display: flex; flex-direction: column; }
        .navbar-custom { background: rgba(255, 255, 255, .88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--card-border); padding: .75rem 0; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
        .navbar-brand-text { font-weight: 800; font-size: 1.35rem; background: linear-gradient(135deg, var(--primary), var(--accent)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-link-custom { color: var(--text-muted); font-weight: 600; font-size: .95rem; text-decoration: none; padding: .5rem 1rem; border-radius: .5rem; }
        .nav-link-custom:hover, .nav-link-custom.active { color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        .message-card { background: #fff; border: 1px solid var(--card-border); border-left: 4px solid var(--primary); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 4px rgba(0,0,0,.04); }
        .message-content { white-space: pre-wrap; font-size: 0.95rem; color: var(--text-dark); margin-top: 0.5rem; }
        .footer { background: var(--text-dark); color: #94a3b8; text-align: center; padding: 2rem 1rem; font-size: .88rem; margin-top: auto; }
    </style>
</head>

<body>
    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between">
            <span class="navbar-brand-text"><i class="bi bi-arrow-left-right me-1"></i>SkillShare</span>
            <div class="d-flex align-items-center gap-2">
                <a th:href="@{/active-users}" class="nav-link-custom">Explore</a>
                <a th:href="@{/profile}" class="nav-link-custom">Profile</a>
                <a th:href="@{/skills}" class="nav-link-custom">My Skills</a>
                <a th:href="@{/requests}" class="nav-link-custom">Requests</a>
                <a th:href="@{/messages}" class="nav-link-custom"><i class="bi bi-chat-fill me-1"></i>Messages</a>
                <a th:href="@{/system-messages}" class="nav-link-custom active"><i class="bi bi-bell-fill me-1"></i>Notifications</a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container py-5" style="max-width: 800px;">
        <h1 class="fw-bold fs-2 mb-4"><i class="bi bi-bell me-2 text-primary"></i>System Messages</h1>
        
        <div th:if="${#lists.isEmpty(messages)}" class="text-center py-5 bg-white border rounded">
            <i class="bi bi-envelope-open text-muted" style="font-size: 3rem;"></i>
            <h4 class="mt-3 text-muted">No messages</h4>
            <p class="text-muted">You have no system messages at this time.</p>
        </div>

        <div th:unless="${#lists.isEmpty(messages)}">
            <div th:each="msg : ${messages}" class="message-card">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-2">
                    <span class="fw-bold text-dark"><i class="bi bi-shield-check text-primary me-2"></i>Administration</span>
                    <small class="text-muted" th:text="${#temporals.format(msg.createdAt, 'dd MMM yyyy, HH:mm')}">Date</small>
                </div>
                <div class="message-content" th:text="${msg.content}">Message Content</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container"><p class="mb-0">&copy; 2026 SkillShare. All rights reserved.</p></div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style th:fragment="navbar-styles">
        .navbar-custom {
            background: rgba(255, 255, 255, .88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(148, 163, 184, .15);
            padding: .75rem 0;
            position: sticky;
            top: 0;
            z-index: 1050;
        }

        .navbar-brand-text {
            font-weight: 800;
            font-size: 1.35rem;
            background: linear-gradient(135deg, var(--primary, #3b82f6), var(--accent, #6366f1));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-link-custom {
            color: var(--text-muted, #64748b);
            font-weight: 600;
            font-size: .95rem;
            text-decoration: none;
            padding: .5rem 1rem;
            border-radius: .5rem;
            transition: color .2s, background .2s;
            position: relative;
        }

        .nav-link-custom:hover, .nav-link-custom.active {
            color: var(--primary, #3b82f6);
            background: var(--primary-subtle, #eff6ff);
        }

        .notification-badge {
            position: absolute;
            top: 4px;
            right: 8px;
            width: 8px;
            height: 8px;
            background-color: #ef4444; /* red-500 */
            border-radius: 50%;
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <nav th:fragment="navbar(activeTab)" class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between">
            <span class="navbar-brand-text">
                <i class="bi bi-arrow-left-right me-1"></i>SkillShare
            </span>
            <div class="d-flex align-items-center gap-2">
                <a th:href="@{/active-users}" class="nav-link-custom" th:classappend="${activeTab == 'explore'} ? 'active' : ''">Explore</a>
                <a th:href="@{/profile}" class="nav-link-custom" th:classappend="${activeTab == 'profile'} ? 'active' : ''">Profile</a>
                <a th:href="@{/skills}" class="nav-link-custom" th:classappend="${activeTab == 'skills'} ? 'active' : ''">My Skills</a>
                <a th:href="@{/requests}" class="nav-link-custom" th:classappend="${activeTab == 'requests'} ? 'active' : ''">Requests</a>
                <a th:href="@{/messages}" class="nav-link-custom" th:classappend="${activeTab == 'messages'} ? 'active' : ''"><i class="bi bi-chat-fill me-1"></i>Messages</a>
                
                <!-- Notification Link with Badge -->
                <a th:href="@{/system-messages}" class="nav-link-custom" th:classappend="${activeTab == 'notifications'} ? 'active' : ''">
                    <i class="bi bi-bell-fill me-1"></i>Notifications
                    <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}" class="notification-badge"></span>
                </a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">Logout</button>
                </form>
            </div>
        </div>
    </nav>
</body>
</html>

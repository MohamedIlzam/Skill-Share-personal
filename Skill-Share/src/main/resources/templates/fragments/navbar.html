<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style th:fragment="navbar-styles">
        .navbar-custom {
            background: rgba(255, 255, 255, .88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(148, 163, 184, .15);
            padding: .75rem 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1050;
        }

        .navbar-brand-text {
            font-weight: 800;
            font-size: 1.35rem;
            background: linear-gradient(135deg, var(--primary, #3b82f6), var(--accent, #6366f1));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-link-custom {
            color: var(--text-muted, #64748b);
            font-weight: 600;
            font-size: .95rem;
            text-decoration: none;
            padding: .5rem 1rem;
            border-radius: .5rem;
            transition: color .2s, background .2s;
            position: relative;
        }

        .nav-link-custom:hover, .nav-link-custom.active {
            color: var(--primary, #3b82f6);
            background: var(--primary-subtle, #eff6ff);
        }

        .notification-badge {
            position: absolute;
            top: 4px;
            right: 8px;
            width: 8px;
            height: 8px;
            background-color: #ef4444; /* red-500 */
            border-radius: 50%;
            border: 2px solid white;
        }

        /* Mobile Icon Buttons & Badges */
        .mobile-icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border-radius: 50%;
            color: #475569;
            transition: all 0.2s;
            text-decoration: none;
            border: none;
            outline: none;
            cursor: pointer;
        }
        .mobile-icon-btn:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
        .mobile-icon-btn.active {
            color: #3b82f6;
            background: #eff6ff;
        }
        .notification-badge-mobile {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            border: 2px solid white;
        }

        /* Responsive Mobile Bottom Tab Bar styles */
        .mobile-bottom-tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
            display: none;
            align-items: center;
            justify-content: space-around;
            z-index: 1050;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.03);
        }

        .mobile-tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            text-decoration: none;
            font-size: 10px;
            font-weight: 700;
            gap: 2px;
            transition: color 0.2s;
            width: 20%;
        }

        .mobile-tab-item:hover, .mobile-tab-item.active {
            color: #3b82f6;
            text-decoration: none;
        }

        .mobile-tab-item i {
            font-size: 20px;
        }

        /* Hide old static PWA tab bar */
        .pwa-tabbar {
            display: none !important;
        }

        /* Fixed navbar padding adjustments */
        body {
            padding-top: 64px !important;
        }

        @media (max-width: 767.98px) {
            body {
                padding-top: 64px !important;
                padding-bottom: 74px !important;
            }
            .mobile-bottom-tabbar {
                display: flex !important;
            }
        }
    </style>
</head>
<body>
    <div th:fragment="navbar(activeTab)">
        <!-- Top Nav Bar (Always Visible - Layout hides desktop elements on mobile) -->
        <nav class="navbar-custom">
            <div class="container d-flex align-items-center justify-content-between">
                <span class="navbar-brand-text">
                    <i class="bi bi-arrow-left-right me-1"></i>SkillShare
                </span>
                
                <!-- Desktop Links (Hidden on Mobile/Tablet) -->
                <div class="d-none d-md-flex align-items-center gap-2">
                    <a th:href="@{/active-users}" class="nav-link-custom" th:classappend="${activeTab == 'explore'} ? 'active' : ''">Explore</a>
                    <a th:href="@{/profile}" class="nav-link-custom" th:classappend="${activeTab == 'profile'} ? 'active' : ''">Profile</a>
                    <a th:href="@{/skills}" class="nav-link-custom" th:classappend="${activeTab == 'skills'} ? 'active' : ''">My Skills</a>
                    <a th:href="@{/requests}" class="nav-link-custom" th:classappend="${activeTab == 'requests'} ? 'active' : ''">Requests</a>
                    <a th:href="@{/messages}" class="nav-link-custom" th:classappend="${activeTab == 'messages'} ? 'active' : ''"><i class="bi bi-chat-fill me-1"></i>Messages</a>
                    
                    <!-- Notification Link with Badge -->
                    <a th:href="@{/system-messages}" class="nav-link-custom" th:classappend="${activeTab == 'notifications'} ? 'active' : ''">
                        <i class="bi bi-bell-fill me-1"></i>Notifications
                        <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}" class="notification-badge"></span>
                    </a>
                </div>

                <!-- Desktop Logout (Hidden on Mobile/Tablet) -->
                <div class="d-none d-md-flex align-items-center gap-3">
                    <form th:action="@{/logout}" method="post" style="margin:0;">
                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">Logout</button>
                    </form>
                </div>

                <!-- Mobile Actions (Visible on Mobile/Tablet only) -->
                <div class="d-flex d-md-none align-items-center gap-2">
                    <!-- Bell Icon for notifications -->
                    <a th:href="@{/system-messages}" class="mobile-icon-btn position-relative" th:classappend="${activeTab == 'notifications'} ? 'active' : ''" title="Notifications">
                        <i class="bi bi-bell-fill"></i>
                        <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}" class="notification-badge-mobile"></span>
                    </a>
                    <!-- Small Logout Button -->
                    <form th:action="@{/logout}" method="post" style="margin:0;">
                        <button type="submit" class="mobile-icon-btn text-danger" style="border: none; background: #fee2e2;" title="Logout">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </form>
                </div>
            </div>
        </nav>

        <!-- Mobile Bottom Tab Bar (Visible on mobile/tablet viewports only) -->
        <nav class="mobile-bottom-tabbar d-flex d-md-none">
            <a th:href="@{/active-users}" class="mobile-tab-item" th:classappend="${activeTab == 'explore'} ? 'active' : ''">
                <i class="bi" th:classappend="${activeTab == 'explore'} ? 'bi-compass-fill' : 'bi-compass'"></i>
                <span>Explore</span>
            </a>
            <a th:href="@{/skills}" class="mobile-tab-item" th:classappend="${activeTab == 'skills'} ? 'active' : ''">
                <i class="bi" th:classappend="${activeTab == 'skills'} ? 'bi-lightbulb-fill' : 'bi-lightbulb'"></i>
                <span>Skills</span>
            </a>
            <a th:href="@{/requests}" class="mobile-tab-item" th:classappend="${activeTab == 'requests'} ? 'active' : ''">
                <i class="bi bi-arrow-left-right"></i>
                <span>Requests</span>
            </a>
            <a th:href="@{/messages}" class="mobile-tab-item" th:classappend="${activeTab == 'messages'} ? 'active' : ''">
                <i class="bi" th:classappend="${activeTab == 'messages'} ? 'bi-chat-dots-fill' : 'bi-chat-dots'"></i>
                <span>Messages</span>
            </a>
            <a th:href="@{/profile}" class="mobile-tab-item" th:classappend="${activeTab == 'profile'} ? 'active' : ''">
                <i class="bi" th:classappend="${activeTab == 'profile'} ? 'bi-person-fill' : 'bi-person'"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>
</body>
</html>

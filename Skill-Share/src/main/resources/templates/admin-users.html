<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users — SkillShare Admin</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --accent: #6366f1;
            --text-dark: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --card-border: rgba(148, 163, 184, .15);
            --radius: 1rem;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            color: var(--text-body);
            background: var(--bg-light);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, .88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--card-border);
            padding: .75rem 0;
            position: sticky;
            top: 0;
            z-index: 1050;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }

        .navbar-brand-text {
            font-weight: 800;
            font-size: 1.35rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-link-custom {
            color: var(--text-muted);
            font-weight: 600;
            font-size: .95rem;
            text-decoration: none;
            padding: .5rem 1rem;
            border-radius: .5rem;
            transition: color .2s, background .2s;
        }

        .nav-link-custom:hover,
        .nav-link-custom.active {
            color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .search-container {
            background: #fff;
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,.05);
            margin-bottom: 2rem;
            border: 1px solid var(--card-border);
        }

        .table-custom {
            background: #fff;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,.05);
            border: 1px solid var(--card-border);
        }

        .table-custom th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            padding: 1rem 1.5rem;
            border-bottom: 2px solid var(--card-border);
        }

        .table-custom td {
            padding: 1rem 1.5rem;
            vertical-align: middle;
            color: var(--text-dark);
            border-bottom: 1px solid var(--card-border);
        }
        
        .status-badge {
            padding: 0.35em 0.8em;
            border-radius: 50rem;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-bg-active {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .status-bg-inactive {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .footer {
            background: var(--text-dark);
            color: #94a3b8;
            text-align: center;
            padding: 2rem 1rem;
            font-size: .88rem;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between">
            <span class="navbar-brand-text">
                <i class="bi bi-shield-lock-fill me-1"></i>SkillShare Admin
            </span>
            <div class="d-flex align-items-center gap-2">
                <a th:href="@{/admin/dashboard}" class="nav-link-custom">Dashboard</a>
                <a th:href="@{/admin/users}" class="nav-link-custom active">Users</a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold fs-2 m-0">Manage Users</h1>
        </div>

        <div class="search-container">
            <form th:action="@{/admin/users}" method="get" class="d-flex gap-2">
                <input type="text" name="query" class="form-control" placeholder="Search by name or email..." th:value="${searchQuery}">
                <button type="submit" id="adminSearchBtn" class="btn btn-primary px-4 fw-bold">Search</button>
                <a th:if="${searchQuery != null && !searchQuery.isEmpty()}" th:href="@{/admin/users}" class="btn btn-outline-secondary px-3">Clear</a>
            </form>
        </div>

        <div th:if="${#lists.isEmpty(users)}" class="text-center py-5 bg-white border rounded">
            <i class="bi bi-people text-muted" style="font-size: 3rem;"></i>
            <h4 class="mt-3 text-muted">No users found</h4>
        </div>

        <div class="table-responsive table-custom" th:unless="${#lists.isEmpty(users)}">
            <table class="table mb-0 table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td class="fw-bold" th:text="${user.fullName}">John Doe</td>
                        <td th:text="${user.email}">john@example.com</td>
                        <td>
                            <span class="badge bg-secondary rounded-pill" th:text="${user.role}">USER</span>
                        </td>
                        <td>
                            <span th:class="'status-badge ' + (${user.status.name() == 'ACTIVE'} ? 'status-bg-active' : 'status-bg-inactive')"
                                  th:text="${user.status}">ACTIVE</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-primary rounded-pill">View Profile</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="mb-0">&copy; 2026 SkillShare Admin. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — SkillShare</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #93c5fd;
            --primary-subtle: #eff6ff;
            --accent: #6366f1;
            --text-dark: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            color: var(--text-body);
            background: var(--bg-light);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, .88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(148, 163, 184, .15);
            padding: .75rem 0;
            flex-shrink: 0;
            z-index: 1050;
        }

        .navbar-brand-text {
            font-weight: 800;
            font-size: 1.35rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #fff;
            border-left: 1px solid rgba(148, 163, 184, .15);
            border-right: 1px solid rgba(148, 163, 184, .15);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            background: #fff;
            border-bottom: 1px solid rgba(148, 163, 184, .15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .chat-body {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 0.75rem 1.25rem;
            border-radius: 1rem;
            position: relative;
            word-wrap: break-word;
        }

        .msg-own {
            background: var(--primary);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }

        .msg-other {
            background: #fff;
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            border: 1px solid rgba(148, 163, 184, .2);
        }

        .msg-time {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 0.25rem;
            display: block;
        }
        
        .msg-own .msg-time {
            color: rgba(255,255,255,0.8);
            text-align: right;
        }

        .msg-other .msg-time {
            color: var(--text-muted);
        }

        .chat-footer {
            padding: 1.25rem;
            background: #fff;
            border-top: 1px solid rgba(148, 163, 184, .15);
        }

        .input-group-custom {
            display: flex;
            background: #f1f5f9;
            border-radius: 2rem;
            padding: 0.25rem;
        }

        .form-control-custom {
            border: none;
            background: transparent;
            padding: 0.75rem 1.5rem;
            flex-grow: 1;
            outline: none;
            color: var(--text-dark);
            resize: none;
        }

        .form-control-custom:focus {
            outline: none;
            box-shadow: none;
        }

        .btn-send {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50rem;
            padding: 0.5rem 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .btn-send:hover {
            background: var(--primary-dark);
        }

        .btn-send:active {
            transform: scale(0.95);
        }
        
        .empty-chat {
            text-align: center;
            margin: auto;
            color: var(--text-muted);
        }

        .participant-name {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
        }
        
        .msg-other .participant-name {
            color: var(--primary-dark);
        }

    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between">
            <span class="navbar-brand-text">
                <i class="bi bi-arrow-left-right me-1"></i>SkillShare
            </span>
            <div class="d-flex align-items-center gap-2">
                <a th:href="@{/requests}" class="btn btn-light btn-sm rounded-pill px-3 fw-bold border"><i class="bi bi-arrow-left me-1"></i>Back to Requests</a>
            </div>
        </div>
    </nav>

    <!-- Chat Container -->
    <main class="chat-container">
        
        <!-- Header -->
        <div class="chat-header">
            <div>
                <h5 class="fw-bold mb-0 text-dark" th:text="${request.selectedSkill.name}">Skill Name</h5>
                <small class="text-muted">
                    Exchange with 
                    <strong th:if="${currentUserId == request.requester.id}" th:text="${request.skillOwner.fullName}">Owner</strong>
                    <strong th:if="${currentUserId == request.skillOwner.id}" th:text="${request.requester.fullName}">Requester</strong>
                </small>
            </div>
            <div>
                <span class="badge" th:classappend="'bg-' + (${request.status.name() == 'PENDING' ? 'warning' : (request.status.name() == 'ACCEPTED' ? 'success' : (request.status.name() == 'COMPLETED' ? 'primary' : 'danger'))})" th:text="${request.status}">STATUS</span>
            </div>
        </div>

        <!-- Alerts -->
        <div th:if="${errorParam}" class="alert alert-danger m-3 mb-0" role="alert">
            <span th:text="${errorParam}">Error</span>
        </div>

        <!-- Body / Messages -->
        <div class="chat-body" id="chatBody">
            
            <div class="empty-chat" th:if="${#lists.isEmpty(messages)}">
                <i class="bi bi-chat-heart fs-1 text-primary" style="opacity: 0.5;"></i>
                <p class="mt-2">No messages yet. Start the conversation!</p>
            </div>

            <div th:each="msg : ${messages}" 
                 class="msg-bubble shadow-sm" 
                 th:classappend="${msg.senderId == currentUserId ? 'msg-own' : 'msg-other'}">
                
                <div class="participant-name" th:if="${msg.senderId != currentUserId}" th:text="${msg.senderName}">Sender</div>
                <div th:text="${msg.content}">Message content</div>
                <span class="msg-time" th:text="${#temporals.format(msg.createdAt, 'dd MMM HH:mm')}">Time</span>
            </div>
            
        </div>

        <!-- Footer / Input Form -->
        <div class="chat-footer">
            <form th:action="@{/requests/{id}/messages/send(id=${request.id})}" method="post" th:object="${newMessage}">
                <div class="input-group-custom">
                    <input type="text" class="form-control-custom" th:field="*{content}" placeholder="Type a message..." required autocomplete="off" autofocus>
                    <button class="btn btn-send shadow-sm" type="submit">
                        <i class="bi bi-send-fill me-1"></i> Send
                    </button>
                </div>
                <div th:if="${#fields.hasErrors('content')}" class="text-danger small mt-1 ms-3" th:errors="*{content}">Error</div>
            </form>
        </div>
    </main>

    <script>
        // Scroll to the bottom of the chat automatically
        document.addEventListener("DOMContentLoaded", function() {
            var chatBody = document.getElementById("chatBody");
            chatBody.scrollTop = chatBody.scrollHeight;
        });
    </script>
</body>
</html>
